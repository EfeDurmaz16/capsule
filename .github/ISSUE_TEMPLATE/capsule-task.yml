name: Capsule implementation task
description: Scoped task for Capsule v1/v2 implementation work.
title: "[CAP-000] "
labels:
  - capsule
  - needs-verification
body:
  - type: input
    id: source-task
    attributes:
      label: Source task
      description: Task identifier from the maintainer plan, if applicable.
      placeholder: CAP-001
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: success-criteria
    attributes:
      label: Success criteria
      description: Concrete checks that must be true before handoff.
      placeholder: |
        - [ ] Capability map stays honest
        - [ ] Tests pass without live credentials
        - [ ] Docs/examples updated
    validations:
      required: true
  - type: dropdown
    id: task-type
    attributes:
      label: Task type
      description: Select the closest taxonomy label.
      options:
        - type:feature
        - type:test
        - type:docs
        - type:infra
        - type:security
        - type:audit
    validations:
      required: true
  - type: input
    id: area
    attributes:
      label: Area labels
      description: Suggested area/provider/release labels.
      placeholder: area:adapter, provider:docker, release:v1
    validations:
      required: true
  - type: textarea
    id: contract-expectations
    attributes:
      label: Contract expectations
      description: Capability, policy, receipt, and adapter-contract expectations for this task.
      placeholder: |
        - Capabilities stay explicit and unsupported paths throw.
        - Policy notes distinguish native, delegated, best-effort, and unsupported enforcement.
        - Receipts include provider, adapter, capability path, support level, and policy decision.
    validations:
      required: false
  - type: textarea
    id: official-adapter
    attributes:
      label: Official adapter notes
      description: If this concerns a provider-maintained adapter, name maintainers, provider docs, live-test gates, and compatibility risks.
      placeholder: |
        - Provider maintainer:
        - Source docs:
        - Required credentials:
        - Live test gate:
        - API compatibility notes:
    validations:
      required: false
  - type: textarea
    id: verification
    attributes:
      label: Required verification
      value: |
        - [ ] pnpm capsule:gap
        - [ ] pnpm typecheck
        - [ ] pnpm test
        - [ ] pnpm build
    validations:
      required: true
  - type: textarea
    id: guardrails
    attributes:
      label: Guardrails
      value: |
        - Do not fake provider support.
        - Do not run live provider operations unless CAPSULE_LIVE_TESTS=1 and credentials are present.
        - Do not log secrets, provider tokens, private keys, or raw connection strings.
        - Commit atomically.
